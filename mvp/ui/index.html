<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gleaner MVP Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Gleaner search</h1>
      <p class="tagline">Search harvested JSON-LD in Elasticsearch</p>
    </header>

    <form id="search-form" class="search-form" role="search">
      <label class="sr-only" for="q">Search</label>
      <input
        id="q"
        name="q"
        type="search"
        placeholder="name, description, keywords…"
        autocomplete="off"
        autofocus
      />
      <button type="submit">Search</button>
    </form>

    <p id="status" class="status" aria-live="polite"></p>
    <section id="results" class="results" aria-label="Search results"></section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
