<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Gleaner MVP Search</title>
  <!-- Apply theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var k = "mvp-ui-theme";
        var t = localStorage.getItem(k);
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-row">
        <h1>Gleaner search</h1>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Switch to dark mode"
          title="Toggle color theme"
        >
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <span class="theme-toggle-label">Dark</span>
        </button>
      </div>
      <p class="tagline">Search harvested JSON-LD in Elasticsearch</p>
    </header>

    <form id="search-form" class="search-form" role="search">
      <label class="sr-only" for="q">Search</label>
      <input
        id="q"
        name="q"
        type="search"
        placeholder="name, description, keywords…"
        autocomplete="off"
        autofocus
      />
      <button type="submit">Search</button>
    </form>

    <p id="status" class="status" aria-live="polite"></p>
    <section id="results" class="results" aria-label="Search results"></section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
