# Local Elasticsearch 8 for MVP indexer / search UI.
# Usage (from mvp/ or build/):
#   docker compose -f build/docker-compose.es.yaml up -d
#   curl -s http://localhost:9200
# Security is disabled — for local demos only.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: mvp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=mvp-gleaner
      # Browser UI (mvp/ui) needs CORS. Use regex form — bare * breaks ES settings YAML.
      - http.cors.enabled=true
      - http.cors.allow-origin=/.*/
      - http.cors.allow-headers=X-Requested-With,Content-Type,Content-Length,Authorization
      - http.cors.allow-methods=OPTIONS,HEAD,GET,POST
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
