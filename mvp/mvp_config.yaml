---
objectstore:
    address: localhost
    port: 4566 
    accessKey: test
    secretKey: test
    ssl: false
    bucket: gleanerio  # set to a bucket you own in your object store of choice
    region: us-east-1
triplestore:
    type: oxigraph
    endpoint: http://localhost:7878
search:
    type: elasticsearch
    endpoint: http://localhost:9400
    index_prefix: gleaner
summoner:
    # Browserless base URL (docker compose -f build/docker-compose.browserless.yaml up -d)
    headless: http://localhost:3000
    headless_token: mvp-local-token   # or env BROWSERLESS_TOKEN; must match compose TOKEN
    headless_timeout_ms: 60000
    headless_concurrent: 2            # client-side browser session cap
    headless_wait_ms: 5000            # extra wait after navigation
    headless_wait_for_ldjson: true    # waitForSelector script[type=application/ld+json]
    headless_block_assets: true       # skip images/fonts/media/css in headless
    headless_hybrid: true             # static first, Browserless if no JSON-LD (when source.headless)
    threads: 5
    delay: 250          # ms between requests per worker
    user_agent: "gleanerio-mvp-summoner/0.1"

